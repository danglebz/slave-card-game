# Render Blueprint — โฮสต์ทั้งเกม (Fastify + Socket.IO เสิร์ฟ client React ที่ build แล้ว) เป็น web service เดียว
# วิธีใช้: Render → New → Blueprint → เลือก repo นี้ (จะอ่านไฟล์นี้อัตโนมัติ)
#
# รันบน Bun ผ่าน Docker (ดู Dockerfile) — Render ยังไม่มี native runtime ให้ Bun ตรงๆ
# build stage ใช้ pnpm (node:22-slim) ตามเดิม, runtime stage สลับมาใช้ oven/bun
services:
  - type: web
    name: slave-card-game
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      # ใส่ค่าพวกนี้เองใน dashboard ถ้าต้องการ (ไม่ตั้ง = ปิดฟีเจอร์นั้น)
      - key: SENTRY_DSN
        sync: false
      - key: METRICS_TOKEN
        sync: false
      # Web Push (แจ้งเตือนแม้ปิดแอป) — ต้องตั้ง VAPID_PUBLIC_KEY + VAPID_PRIVATE_KEY ให้ครบถึงจะเปิด
      # gen: node -e "console.log(require('web-push').generateVAPIDKeys())"
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
